name: Sample YAML Configuration
version: 1.0.0
services:
  - name: web
    image: nginx:latest
    ports:
      - "80:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
  - name: api
    image: python:3.11
    ports:
      - "8000:8000"
database:
  host: localhost
  port: 5432
  name: myapp